<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt-Me | Iniciar Sesión</title>
    <link rel="stylesheet" href="../styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="login-container">
        
        <div class="login-image">
            <div class="overlay-text">
                <h3><span class="heart"></span></h3>
                <p></p>
            </div>
        </div>

        <div class="login-form-section">
            <div class="form-box">
                <h1>¡Bienvenido de nuevo!</h1>
                <p class="subtitle">Ingresa a tu cuenta para continuar</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" placeholder="tu@correo.com" required>
                    </div>

                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="********" required>
                    </div>

                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>Recordarme</span>
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-primary">Iniciar Sesión</button>

                    <div class="bottom-link">
                        ¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="../scripts/login.js"></script>
</body>
</html>
