<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt-Me | Panel de Decisiones Admin</title>
    <link rel="stylesheet" href="../styles/chat-admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="admin-header">
        <div class="header-left">
            <div class="logo-area">
                <i class="fas fa-paw logo-icon"></i>
                <span class="brand">Adopt-Me Admin</span>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-item">
                <span class="dot yellow"></span> 
                <div class="stat-text"><b id="count-pendientes">0</b> <span>Pendientes</span></div>
            </div>
            <div class="stat-item">
                <span class="dot green"></span>
                <div class="stat-text"><b id="count-aprobados">0</b> <span>Aprobados</span></div>
            </div>
        </div>

        <a href="index-admin.html" class="btn-volver">
            <i class="fas fa-arrow-left"></i> Panel Principal
        </a>
    </header>

    <div class="admin-main-container">
        <aside class="chat-sidebar">
            <div class="sidebar-header"><h3>Solicitudes</h3></div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Buscar interesado...">
            </div>
            <div class="conversations-list" id="listaConversaciones">
                </div>
        </aside>

        <main class="chat-panel">
            <div class="chat-header" id="chatHeaderContainer" style="display: none;">
                <div class="header-user-info">
                    <div class="header-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <h4 id="header-name">Usuario</h4>
                        <div class="header-subtext">Mascota: <span id="header-pet" class="orange-text">...</span></div>
                    </div>
                </div>

                <div class="header-actions">
                    <div class="admin-decision-btns" style="display: flex; gap: 10px; margin-right: 15px;">
                        <button onclick="window.actualizarEstadoSolicitud('Aprobada')" 
                                style="background:#27ae60; color:white; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:8px;">
                            <i class="fas fa-check"></i> Aprobar
                        </button>
                        <button onclick="window.actualizarEstadoSolicitud('Rechazada')" 
                                style="background:#e74c3c; color:white; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:8px;">
                            <i class="fas fa-times"></i> Rechazar
                        </button>
                    </div>
                   
                </div>
            </div>

            <div class="messages-container" id="messagesArea">
                <div class="empty-state">
                    <i class="far fa-comments"></i>
                    <h3>Bandeja de Entrada</h3>
                    <p>Selecciona una solicitud para gestionar la adopción.</p>
                </div>
            </div>

            <div class="input-area" id="inputAreaContainer" style="display:none;">
                <div class="input-wrapper">
                    <input type="text" id="adminInput" placeholder="Escribe un mensaje...">
                    <button id="btnEnviar" class="btn-send"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>

    <script src="../scripts/chat-admin.js"></script>
</body>
</html>
