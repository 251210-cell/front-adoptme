<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt-Me | Panel de Decisiones Admin</title>
    <link rel="stylesheet" href="../styles/chat-admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="admin-header">
        <div class="header-left">
            <div class="logo-area">
                <i class="fas fa-paw logo-icon"></i>
                <span>Adopt-Me Admin</span>
            </div>
        </div>

        <div class="header-stats">
            <div class="stat-item">
                <span class="dot yellow"></span> 
                <b><span id="count-pendientes">0</span> Pendientes</b>
            </div>
            <div class="stat-item">
                <span class="dot green"></span>
                <b><span id="count-aprobados">0</span> Aprobados</b>
            </div>
        </div>

        <a href="index-admin.html" class="btn-volver">← Panel Principal</a>
    </header>

    <div class="layout-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Solicitudes</h2>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Buscar interesado...">
                </div>
            </div>
            <div class="chat-list" id="listaConversaciones">
                </div>
        </aside>

        <main class="chat-panel" id="messagesArea">
            <div class="empty-state">
                <i class="far fa-comments"></i>
                <h3>Bandeja de Entrada</h3>
                <p>Selecciona una solicitud para gestionar la adopción.</p>
            </div>
        </main>
    </div>

    <script src="../scripts/chat-admin.js"></script>
</body>
</html>
