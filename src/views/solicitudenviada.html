<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Enviada | Adopt-Me</title>
    <link rel="stylesheet" href="../styles/solicitudenviada.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <a href="../../index.html" class="logo-container">
            <i class="fas fa-paw logo-icon"></i>
            <span>Adopt-Me</span>
        </a>
        <nav class="nav-menu">
            <a href="comoadoptar.html" class="nav-link">Cómo Adoptar</a>
            <a href="nosotros.html" class="nav-link">Nosotros</a>
        </nav>
    </header>

    <main class="main-centered-content">
        <div class="confirmation-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>

            <h1>¡Solicitud Enviada!</h1>
            <div class="underline"></div>

            <p class="subtitle">Gracias por darle a <span id="exito-nombre-perro">tu nuevo amigo</span> una oportunidad de tener un hogar.</p>

            <div class="dog-photo-container">
                <img id="exito-foto-perro" src="" alt="Mascota">
            </div>

            <div class="info-box">
                <i class="fas fa-info-circle"></i>
                <p>Hemos recibido tu solicitud y la revisaremos pronto. Te contactaremos en las próximas 48 horas. ¡Estamos muy emocionados!</p>
            </div>

            <a href="../../index.html" class="btn-home">Volver al Inicio</a>

            <a href="#" id="btn-volver-perfil" class="profile-link">
                <i class="fas fa-paw"></i> Ver perfil de <span id="nombre-boton-volver">la mascota</span>
            </a>
        </div>
    </main>

    <script src="../scripts/solicitudenviada.js"></script>
</body>
</html>
