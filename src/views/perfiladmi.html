<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt-Me | Perfil Administrador</title>
    <link rel="stylesheet" href="../styles/perfiladmi.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header class="main-header">
        <div class="logo-container">
            <i class="fas fa-paw logo-icon"></i>
            <span>Adopt-Me</span>
        </div>
        <nav class="nav-menu">
            <a href="index-admin.html" class="btn-outline-naranja nav-btn-back">
                <i class="fas fa-arrow-left"></i> Volver al Panel
            </a>
        </nav>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1>Perfil del Administrador</h1>
            <div class="underline"></div>
            <p class="subtitle">Gestiona tu información de contacto y credenciales.</p>
        </div>

        <div class="profile-card">
            <div class="profile-left">
                <div class="avatar-wrapper">
                    <img src="" alt="Avatar Admin" id="perfilAvatarImg">
                   
                      
                    </button>
                </div>
                <h2 id="perfilNombreDisplay">Cargando...</h2>
               
            </div>

            <div class="profile-right">
                <h3>Datos Personales</h3>
                <form id="formPerfilAdmin">
                    <div class="form-group">
                        <label>Nombre Mostrado</label>
                        <div class="input-wrapper">
                            <i class="far fa-user"></i>
                            <input type="text" id="perfilNombre" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Correo Electrónico </label>
                        <div class="input-wrapper">
                            <i class="far fa-envelope"></i>
                            <input type="email" id="perfilCorreo" readonly style="background: #f0f0f0; cursor: not-allowed;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Teléfono de Contacto del Refugio</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone-alt"></i>
                            <input type="text" id="perfilTelefono">
                        </div>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn-guardar">
                            <i class="fas fa-save"></i> Guardar Cambios
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script type="module" src="../scripts/perfiladmi.js"></script>
</body>
</html>
